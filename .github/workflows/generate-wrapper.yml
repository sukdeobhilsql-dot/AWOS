name: Generate Gradle Wrapper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wrapper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate wrapper (Gradle 8.7)
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Commit wrapper files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A gradlew gradlew.bat gradle/
          git status
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "Add complete Gradle Wrapper"
          git push
